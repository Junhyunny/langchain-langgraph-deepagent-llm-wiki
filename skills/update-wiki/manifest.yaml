name: update-wiki
version: 1.0.0
description: >
  raw 파일 또는 source summary를 기반으로 wiki 페이지를 안전하게 업데이트하는 스킬.
  출처 추적, 사실/해석/가설 분리, 기존 wiki와의 충돌 감지, open questions 관리를 포함한다.
  "요약을 많이 만드는 것"이 아니라, 출처가 추적 가능하고 기존 지식과 연결된
  지식 상태로 바꾸는 것이 목표다.
category: knowledge-management
tags: [wiki, update, source, summary, conflict, open-questions, knowledge-base]
invocation: /update-wiki
preconditions:
  - docs/raw_manifest.yml 이 존재해야 함
  - docs/source_summaries/ 또는 docs/raw/ 에 입력 파일이 존재해야 함
  - docs/wiki/ 디렉토리가 존재해야 함
effects:
  - docs/source_summaries/<source-id>.md 생성 (raw 입력일 경우)
  - 관련 docs/wiki/ 페이지 업데이트
  - docs/wiki/_open_questions.md 업데이트
next_steps:
  - 변경 사항 git diff로 리뷰
  - 추가 source 수집 필요시 fetch-raw-doc 스킬 사용
