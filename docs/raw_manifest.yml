      - "docs/wiki/flows/LangChain create_agent flow.md"
      - "docs/wiki/codebase/LangChain Code Map.md"
    notes: "BaseChatModel.bind_tools는 추상(NotImplementedError). OpenAI 구현: BaseChatOpenAI.bind_tools → convert_to_openai_tool → convert_to_openai_function → _format_tool_to_openai_function → {type:function, function:{...}}. tool_choice 정규화(any→required, 이름→dict). Anthropic은 별도 변환 경로."

  - id: langchain-source-tools-2026-05-23
    title: "LangChain — Tools Source Code (BaseTool / StructuredTool / @tool decorator)"
    type: source_code
    framework: LangChain
    url: "https://github.com/langchain-ai/langchain/tree/master/libs/core/langchain_core/tools"
    local_path: "docs/raw/official/langchain/langchain-source-tools-2026-05-23.md"
    retrieved_at: "2026-05-23"
    status: current
    used_by:
      - "docs/wiki/concepts/Tool Calling.md"
      - "docs/wiki/codebase/LangChain Code Map.md"
      - "docs/wiki/flows/LangChain create_agent flow.md"
    notes: "@tool 데코레이터(convert.py): 4가지 오버로드, StructuredTool.from_function 위임, async 함수는 coroutine 파라미터로 처리, infer_schema=False면 단순 Tool 반환. StructuredTool(structured.py): BaseTool 구현체, func/coroutine 필드, from_function classmethod, create_schema_from_function으로 args_schema 자동 생성. BaseTool(base.py): RunnableSerializable 상속, tool_call_schema(InjectedToolArg 제외), _parse_input→_to_args_and_kwargs→_run 실행 경로, handle_tool_error/handle_validation_error, _format_output→ToolMessage 반환. InjectedToolArg/InjectedToolCallId: LLM schema에서 제외되는 runtime 주입 인자."

  - id: langchain-source-text-splitters-2026-05-23
    title: "LangChain — Text Splitters Source Code (CharacterTextSplitter / RecursiveCharacterTextSplitter)"
    type: source_code
    framework: LangChain
    url: "https://github.com/langchain-ai/langchain/tree/master/libs/text-splitters/langchain_text_splitters"
    local_path: "docs/raw/official/langchain/langchain-source-text-splitters-2026-05-23.md"
    retrieved_at: "2026-05-23"
    status: current
    used_by:
      - "docs/wiki/concepts/RAG.md"
    notes: "CharacterTextSplitter: separator(기본 \\n\\n), is_separator_regex. RecursiveCharacterTextSplitter: separators 리스트(기본 [\\n\\n, \\n, ' ', '']), 재귀적 분할, from_language() classmethod(30+ 언어 지원), get_separators_for_language(). TextSplitter 기반: chunk_size(기본 4000), chunk_overlap(기본 200), keep_separator, add_start_index, strip_whitespace. _merge_splits()로 청크 병합. 패키지: langchain-text-splitters(langchain_text_splitters)."

  - id: langchain-source-dynamic-prompt-2026-05-23
    title: "LangChain — @dynamic_prompt decorator 소스코드 (middleware/types.py)"
    type: source_code
    framework: LangChain
    url: "https://github.com/langchain-ai/langchain/blob/master/libs/langchain_v1/langchain/agents/middleware/types.py"
    local_path: "docs/raw/official/langchain/langchain-source-dynamic-prompt-2026-05-23.md"
    retrieved_at: "2026-05-23"
    status: current
    used_by:
      - "docs/wiki/concepts/RAG.md"
      - "docs/wiki/concepts/Context Engineering.md"
    notes: "@dynamic_prompt는 langchain.agents.middleware.types에 정의된 AgentMiddleware 생성 데코레이터. 함수 서명: (request: ModelRequest) -> str | SystemMessage. wrap_model_call을 사용해 모델 호출 전 시스템 프롬프트를 동적 교체. sync/async 모두 지원. RAG 문서의 @dynamic_prompt (user_query: str) -> list 패턴과 시그니처 불일치 → 확인 필요. AgentMiddleware 기본 클래스, ModelRequest(model/messages/system_message/state/runtime), AgentState(messages+add_messages) 정의 포함."

  - id: deepagents-source-evals-structure-2026-05-23
